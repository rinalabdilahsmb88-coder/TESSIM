<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SYAIR LINE TOGEL | Jelas & Tajam</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Background gambar - tanpa overlay gradien */
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background-image: url('https://cdn.areabermain.club/assets/cdn/az6/2026/01/08/20260108/0e9b0ec9a88ad88a5935bc5802bc41a5/linetogel-background-07januari2026.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    /* Overlay gelap polos (tanpa gradien) */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      z-index: 0;
    }

    /* Tombol kontrol - tanpa gradien */
    .controls-bar {
      width: 100%;
      max-width: 500px;
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      z-index: 10;
      position: relative;
    }

    .btn-control {
      flex: 1;
      padding: 0.9rem 1rem;
      border-radius: 60px;
      font-weight: 800;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.1s;
      text-transform: uppercase;
      letter-spacing: 1px;
      background-color: #e67e22; /* solid orange */
      color: white;
    }
    .btn-spin { background-color: #e67e22; }
    .btn-save { background-color: #2c3e50; color: #ffc107; border: 1px solid #ffc107; }
    .btn-control:hover { transform: translateY(-2px); filter: brightness(1.05); }

    /* KARTU UTAMA - flat, tanpa shadow berlebihan */
    .main-card {
      width: 100%;
      max-width: 500px;
      background-color: #3d2b1f;
      border-radius: 28px;
      overflow: hidden;
      border: 3px solid #ffc107;
      position: relative;
      z-index: 10;
      box-shadow: none; /* hilangkan shadow agar tidak blur */
    }

    .card-inner {
      background-color: #5c4033;
      padding: 1.8rem;
    }

    /* Header */
    .header-section {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .main-title {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      font-weight: 800;
      color: #ffc107;
      letter-spacing: 3px;
      text-shadow: none; /* hilangkan text-shadow agar lebih tajam */
    }
    .sub-title {
      font-size: 0.7rem;
      color: #f0e6d2;
      letter-spacing: 2px;
      margin-top: 0.3rem;
    }

    /* Info row */
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding: 0 0.3rem;
    }
    .date-text {
      font-size: 0.9rem;
      color: white;
      font-weight: 600;
      background: rgba(0,0,0,0.5);
      padding: 0.3rem 0.8rem;
      border-radius: 40px;
    }
    /* Logo box background hitam solid */
    .logo-box {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background-color: #000000;
      border: 3px solid #ffc107;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: none;
    }
    .logo-box img {
      width: 85%;
      height: 85%;
      object-fit: contain;
    }

    /* Syair box - putih polos */
    .syair-box {
      background: #ffffff;
      border-radius: 20px;
      padding: 1.8rem 1.2rem;
      margin-bottom: 1.5rem;
      text-align: center;
      box-shadow: none;
    }
    .star-container {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto 1.2rem;
    }
    .star-svg {
      width: 100%;
      height: 100%;
    }
    .star-point {
      position: absolute;
      font-weight: 800;
      font-size: 1.2rem;
      color: black;
      background: white;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      box-shadow: none;
      font-family: monospace;
      border: 1px solid #ccc;
    }
    .star-top { top: -12px; left: 50%; transform: translateX(-50%); }
    .star-bottom { bottom: -12px; left: 50%; transform: translateX(-50%); }
    .star-left { left: -12px; top: 50%; transform: translateY(-50%); }
    .star-right { right: -12px; top: 50%; transform: translateY(-50%); }

    .syair-content {
      font-family: 'Cinzel', serif;
      color: #000000;
      font-size: 1rem;
      line-height: 1.8;
      font-weight: 600;
      white-space: pre-line;
    }

    /* Result section - flat */
    .result-section {
      display: flex;
      gap: 1rem;
      align-items: center;
      background-color: #4a3728;
      padding: 1rem;
      border-radius: 18px;
      border: 2px solid #ffc107;
      margin-bottom: 0.5rem;
    }
    .animal-box {
      width: 85px;
      height: 85px;
      background: white;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 2px solid #ffc107;
      flex-shrink: 0;
    }
    .animal-box img {
      width: 90%;
      height: 90%;
      object-fit: contain;
    }
    .data-list {
      flex: 1;
    }
    .data-row {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      margin-bottom: 0.6rem;
      flex-wrap: wrap;
    }
    .data-label {
      font-size: 0.75rem;
      color: #ffecb3;
      text-transform: uppercase;
      font-weight: 600;
      min-width: 80px;
    }
    .data-value {
      font-size: 1rem;
      color: #ffc107;
      font-weight: 800;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
    }

    /* Footer */
    .footer-section {
      text-align: center;
      margin-top: 1.5rem;
      border-top: 2px solid #ffc107;
      padding-top: 1rem;
    }
    .url-footer {
      font-size: 0.8rem;
      color: white;
      font-weight: 600;
      word-break: break-all;
    }

    /* Animasi sederhana */
    .fade-anim { animation: gentleFade 0.3s ease; }
    @keyframes gentleFade {
      0% { opacity: 0.8; }
      100% { opacity: 1; }
    }

    @media (max-width: 480px) {
      .card-inner { padding: 1.2rem; }
      .main-title { font-size: 1.5rem; }
      .star-container { width: 85px; height: 85px; }
      .star-point { width: 24px; height: 24px; font-size: 1rem; }
      .animal-box { width: 70px; height: 70px; }
    }
  </style>
</head>
<body>

<div class="controls-bar">
  <button class="btn-control btn-spin" id="btnSpin">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M21 12a9 9 0 11-6.219-8.56"/>
      <polyline points="21 3 21 9 15 9"/>
    </svg>
    PUTAR RAMALAN
  </button>
  <button class="btn-control btn-save" id="btnSave">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    SIMPAN HD (TAJAM)
  </button>
</div>

<div class="main-card" id="mainCard">
  <div class="card-inner">
    <div class="header-section">
      <h1 class="main-title">SYAIR LINE TOGEL</h1>
      <p class="sub-title">PASANG BERSAMA, WITHDRAW BERSAMA</p>
    </div>

    <div class="info-row">
      <div class="date-text" id="dateDisplay">Tanggal : 21 April 2026</div>
      <div class="logo-box">
        <img id="pasaranLogo" src="https://i.postimg.cc/9MSqMqNx/newyork.png" alt="Logo" crossorigin="anonymous">
      </div>
    </div>

    <div class="syair-box">
      <div class="star-container">
        <svg class="star-svg" viewBox="0 0 100 100">
          <polygon points="50,0 61,35 98,35 68,57 79,91 50,70 21,91 32,57 2,35 39,35" fill="#fff" stroke="#b8860b" stroke-width="1.5"/>
        </svg>
        <div class="star-point star-top" id="starTop">9</div>
        <div class="star-point star-right" id="starRight">2</div>
        <div class="star-point star-bottom" id="starBottom">5</div>
        <div class="star-point star-left" id="starLeft">1</div>
      </div>
      <div class="syair-content" id="syairContent">
        Air terjun mengalir deras<br>
        Bambu runcing menusuk angin<br>
        Langit biru menunjuk utara<br>
        Singa tidur beranjak siang
      </div>
    </div>

    <div class="result-section">
      <div class="animal-box">
        <img id="animalImg" src="https://i.postimg.cc/Kjb7bbt7/ulartt.png" alt="Hewan" crossorigin="anonymous">
      </div>
      <div class="data-list">
        <div class="data-row">
          <span class="data-label">BINATANGNYA:</span>
          <span class="data-value" id="animalName">ULAR</span>
        </div>
        <div class="data-row">
          <span class="data-label">MK:</span>
          <span class="data-value" id="mkValue">0 / 4</span>
        </div>
        <div class="data-row">
          <span class="data-label">NAGA:</span>
          <span class="data-value" id="nagaValue">7 - 5 - 8</span>
        </div>
      </div>
    </div>

    <div class="footer-section">
      <div class="url-footer">https://linklist.bio/situslinetgl</div>
    </div>
  </div>
</div>

<script>
  // Data pasaran, shio, syair
  const pasaranList = [
    { name: "NEW YORK", logo: "https://i.postimg.cc/9MSqMqNx/newyork.png" },
    { name: "HONGKONG", logo: "https://i.postimg.cc/RC7t7GqH/hongkong.png" },
    { name: "SINGAPORE", logo: "https://i.postimg.cc/j2cCGgJ6/singapore.png" },
    { name: "SYDNEY", logo: "https://i.postimg.cc/nLX7qJQr/sydney.png" },
    { name: "CAMBODIA", logo: "https://i.postimg.cc/xd8GgmhP/cambodia.png" },
    { name: "MAGNUM", logo: "https://i.postimg.cc/ncVXvJ6g/magnum.png" },
    { name: "BULLSEYE", logo: "https://i.postimg.cc/jSgPW52G/bullseye.png" },
    { name: "TOTO MACAU", logo: "https://i.postimg.cc/nhcqc7Fs/totomacu.png" },
    { name: "KING KONG", logo: "https://i.postimg.cc/qRy4rDF2/kkkk.png" }
  ];

  const shioList = [
    { name: "TIKUS", img: "https://i.postimg.cc/T2nQ47nQ/tikusvvvv.png" },
    { name: "KERBAU", img: "https://i.postimg.cc/TYGQMV9G/kerbau222.png" },
    { name: "HARIMAU", img: "https://i.postimg.cc/Wbn82dWr/harimau7.png" },
    { name: "KELINCI", img: "https://i.postimg.cc/4x219rTn/kelinciiiii.png" },
    { name: "NAGA", img: "https://i.postimg.cc/PqBz6Yxc/dvdvdvdvdv.png" },
    { name: "ULAR", img: "https://i.postimg.cc/Kjb7bbt7/ulartt.png" },
    { name: "KUDA", img: "https://i.postimg.cc/mkSY2nwW/kudududud.png" },
    { name: "KAMBING", img: "https://i.postimg.cc/D05xY0Rq/kambigngg.png" },
    { name: "MONYET", img: "https://i.postimg.cc/y6TpNpW3/monyettt.png" },
    { name: "AYAM", img: "https://i.postimg.cc/HssZ807r/ayamamamama.png" },
    { name: "ANJING", img: "https://i.postimg.cc/m22X13F9/anjinggg.png" },
    { name: "BABI", img: "https://i.postimg.cc/RVVsJ1nL/babaibabai.png" }
  ];

  const syairList = [
    "Air terjun mengalir deras<br>Bambu runcing menusuk angin<br>Langit biru menunjuk utara<br>Singa tidur beranjak siang",
    "Harimau berteriak di pagi hari<br>Elang terbang mengejar mangsa<br>Gajah besar berjalan lambat<br>Matahari terbit di ufuk timur",
    "Burung merpati terbang tinggi<br>Ikan berenang di dasar kolam<br>Angin berhembus sangat kencang<br>Petir menyambar di malam gelap",
    "Kancil kecil berlari kencang<br>Buaya tidur di tepi sungai<br>Pohon beringin berdiri tegak<br>Relaksasi jiwa di pagi hari",
    "Mawar merah mekar indah<br>Melati putih wangi semerbak<br>Anggrek hitam misterius<br>Bunga matahari menghadap sinar"
  ];

  const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 
                  'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];

  function randomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
  function randomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function spinContent() {
    const card = document.getElementById('mainCard');
    card.classList.remove('fade-anim');
    void card.offsetWidth;
    card.classList.add('fade-anim');

    const today = new Date();
    document.getElementById('dateDisplay').innerText = `Tanggal : ${today.getDate()} ${months[today.getMonth()]} ${today.getFullYear()}`;

    const pasaran = randomItem(pasaranList);
    document.getElementById('pasaranLogo').src = pasaran.logo;

    const shio = randomItem(shioList);
    document.getElementById('animalImg').src = shio.img;
    document.getElementById('animalName').innerText = shio.name;

    document.getElementById('syairContent').innerHTML = randomItem(syairList);

    document.getElementById('mkValue').innerText = `${randomInt(0,9)} / ${randomInt(0,9)}`;
    document.getElementById('nagaValue').innerText = `${randomInt(0,9)} - ${randomInt(0,9)} - ${randomInt(0,9)}`;

    document.getElementById('starTop').innerText = randomInt(0,9);
    document.getElementById('starRight').innerText = randomInt(0,9);
    document.getElementById('starBottom').innerText = randomInt(0,9);
    document.getElementById('starLeft').innerText = randomInt(0,9);
  }

  // Fungsi simpan HD dengan kualitas tertinggi dan tanpa blur
  async function saveHighQuality() {
    const btn = document.getElementById('btnSave');
    const originalHTML = btn.innerHTML;
    btn.innerHTML = "⏳ MEMPROSES...";
    btn.disabled = true;

    const cardElement = document.getElementById('mainCard');
    
    try {
      await document.fonts.ready;
      
      // Tunggu semua gambar
      const allImages = cardElement.querySelectorAll('img');
      await Promise.all(Array.from(allImages).map(img => {
        if (img.complete && img.naturalWidth > 0) return Promise.resolve();
        return new Promise((resolve) => {
          img.onload = () => resolve();
          img.onerror = () => resolve();
          setTimeout(resolve, 1000);
        });
      }));
      
      // Jeda singkat
      await new Promise(r => setTimeout(r, 100));
      
      // Skala tinggi untuk hasil tajam (min 3, max 5)
      const scale = Math.min(5, Math.max(3, window.devicePixelRatio * 2));
      
      const canvas = await html2canvas(cardElement, {
        scale: scale,
        useCORS: true,
        allowTaint: false,
        backgroundColor: '#5c4033', // solid, sama dengan background card-inner
        logging: false,
        windowWidth: cardElement.scrollWidth,
        windowHeight: cardElement.scrollHeight,
        imageTimeout: 5000
      });
      
      const link = document.createElement('a');
      link.download = `SYAIR-LINE-TAJAM-${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png', 1.0);
      link.click();
      
    } catch (error) {
      console.error(error);
      alert('Gagal menyimpan gambar. Coba lagi.');
    } finally {
      btn.innerHTML = originalHTML;
      btn.disabled = false;
    }
  }

  document.getElementById('btnSpin').addEventListener('click', spinContent);
  document.getElementById('btnSave').addEventListener('click', saveHighQuality);
  
  spinContent();
</script>
</body>
</html>
