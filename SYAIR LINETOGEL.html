<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYAIR LINE TOGEL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <style>
    :root {
      --bg-dark: #0a0806;
      --accent-gold: #d4a544;
      --text-light: #f5e6c8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at 50% 0%, rgba(212, 165, 68, 0.1) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .controls-bar {
      width: 100%;
      max-width: 500px;
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      z-index: 100;
    }

    .btn-control {
      flex: 1;
      padding: 0.9rem 1.2rem;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .btn-spin {
      background: linear-gradient(135deg, #c77a2a, #d4a544);
      color: #000;
      box-shadow: 0 4px 15px rgba(212, 165, 68, 0.3);
    }
    .btn-spin:hover { transform: translateY(-2px); filter: brightness(1.1); }

    .btn-save {
      background: #151210;
      color: var(--accent-gold);
      border: 1px solid #8b6914;
    }
    .btn-save:hover { background: #1f1a15; }

    .main-card {
      position: relative;
      width: 100%;
      max-width: 500px;
      background: linear-gradient(180deg, #12100d 0%, #0a0806 100%);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0,0,0,0.8);
      z-index: 10;
      border: 1px solid rgba(212, 165, 68, 0.2);
    }

    .card-inner { padding: 2rem; }

    /* Header */
    .header-section { text-align: center; margin-bottom: 1.5rem; }
    
    .main-title {
      font-family: 'Cinzel', serif;
      font-size: 1.7rem;
      font-weight: 800;
      color: var(--accent-gold);
      letter-spacing: 3px;
      text-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }
    
    .sub-title {
      font-size: 0.75rem;
      color: #aaa;
      letter-spacing: 2px;
      margin-top: 0.3rem;
      text-transform: uppercase;
    }

    /* Info Row with Logo */
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .date-text {
      font-size: 0.95rem;
      color: var(--text-light);
      font-weight: 600;
    }

    /* DIPERBAIKI: Logo Pasaran Box */
    .logo-box {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a1510 0%, #0d0b08 100%);
      border: 2px solid var(--accent-gold);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    .logo-box img {
      width: 90%;
      height: 90%;
      object-fit: contain;
    }

    /* SYAIR BOX - Putih Bersih */
    .syair-box {
      background: #ffffff;
      border-radius: 12px;
      padding: 2rem 1.5rem;
      margin-bottom: 1.5rem;
      position: relative;
      text-align: center;
    }

    /* Bintang Angka */
    .star-container {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 1.5rem;
    }

    .star-svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1));
    }
    
    .star-point {
      position: absolute;
      font-weight: 800;
      font-size: 1.2rem;
      color: #000;
      font-family: 'Inter', sans-serif;
    }
    .star-top { top: -10px; left: 50%; transform: translateX(-50%); }
    .star-bottom { bottom: -10px; left: 50%; transform: translateX(-50%); }
    .star-left { left: -5px; top: 50%; transform: translateY(-50%); }
    .star-right { right: -5px; top: 50%; transform: translateY(-50%); }

    /* Teks Syair Hitam */
    .syair-content {
      font-family: 'Cinzel', serif;
      color: #111111;
      font-size: 1rem;
      line-height: 2;
      font-weight: 600;
    }

    /* Animal & Info */
    .result-section {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      align-items: center;
    }

    .animal-box {
      width: 110px;
      height: 110px;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid var(--accent-gold);
      flex-shrink: 0;
      background: #000;
    }

    .animal-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .data-list {
      flex: 1;
    }

    .data-row {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
    }

    .data-label {
      font-size: 0.8rem;
      color: #aaa;
      text-transform: uppercase;
      min-width: 85px;
    }

    .data-value {
      font-size: 1rem;
      color: var(--accent-gold);
      font-weight: 700;
      font-family: 'Courier New', monospace;
    }

    /* Footer */
    .footer-section {
      text-align: center;
      margin-top: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 1rem;
    }

    .url-footer {
      font-size: 0.75rem;
      color: #888;
      letter-spacing: 0.5px;
    }

    .fade-anim { animation: fade 0.4s ease; }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

    @media (max-width: 480px) {
      .card-inner { padding: 1.5rem; }
      .main-title { font-size: 1.4rem; }
      .star-container { width: 100px; height: 100px; }
      .result-section { flex-direction: column; text-align: center; }
      .data-row { justify-content: center; }
      .logo-box { width: 60px; height: 60px; }
    }
  </style>
</head>
<body>

  <div class="controls-bar">
    <button class="btn-control btn-spin" id="btnSpin">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 12a9 9 0 11-6.219-8.56"/>
        <polyline points="21 3 21 9 15 9"/>
      </svg>
      PUTAR
    </button>
    <button class="btn-control btn-save" id="btnSave">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      SIMPAN
    </button>
  </div>

  <div class="main-card" id="mainCard">
    <div class="card-inner">
      
      <div class="header-section">
        <h1 class="main-title">SYAIR LINE TOGEL</h1>
        <p class="sub-title">PASANG BERSAMA, WITHDRAW BERSAMA</p>
      </div>

      <!-- Info Row: Tanggal & Logo -->
      <div class="info-row">
        <div class="date-text" id="dateDisplay">Tanggal : 21 April 2026</div>
        <!-- Logo Pasaran Dipertahankan -->
        <div class="logo-box">
          <img id="pasaranLogo" src="https://i.postimg.cc/9MSqMqNx/newyork.png" alt="Logo">
        </div>
      </div>

      <!-- KOTAK SYAIR PUTIH -->
      <div class="syair-box">
        <!-- Bintang Angka -->
        <div class="star-container">
          <svg class="star-svg" viewBox="0 0 100 100">
            <polygon points="50,0 61,35 98,35 68,57 79,91 50,70 21,91 32,57 2,35 39,35" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
          </svg>
          <div class="star-point star-top" id="starTop">9</div>
          <div class="star-point star-right" id="starRight">2</div>
          <div class="star-point star-bottom" id="starBottom">5</div>
          <div class="star-point star-left" id="starLeft">1</div>
        </div>
        
        <!-- Teks Syair Hitam -->
        <div class="syair-content" id="syairContent">
          Air terjun mengalir deras<br>
          Bambu runcing menusuk angin<br>
          Langit biru menunjuk utara<br>
          Singa tidur beranjak siang
        </div>
      </div>

      <!-- Result Section -->
      <div class="result-section">
        <div class="animal-box">
          <img id="animalImg" src="https://i.postimg.cc/Kjb7bbt7/ulartt.png" alt="Hewan">
        </div>
        <div class="data-list">
          <div class="data-row">
            <span class="data-label">Binatangnya:</span>
            <span class="data-value" id="animalName">ULAR</span>
          </div>
          <div class="data-row">
            <span class="data-label">MK:</span>
            <span class="data-value" id="mkValue">0 / 4</span>
          </div>
          <div class="data-row">
            <span class="data-label">Naga:</span>
            <span class="data-value" id="nagaValue">7 - 5 - 8</span>
          </div>
        </div>
      </div>

      <div class="footer-section">
        <div class="url-footer">https://linklist.bio/situslinetgl</div>
      </div>

    </div>
  </div>

<script>
  // Data Pasaran dengan Logo
  const pasaranList = [
    { name: "NEW YORK", logo: "https://i.postimg.cc/9MSqMqNx/newyork.png" },
    { name: "HONGKONG", logo: "https://i.postimg.cc/RC7t7GqH/hongkong.png" },
    { name: "SINGAPORE", logo: "https://i.postimg.cc/j2cCGgJ6/singapore.png" },
    { name: "SYDNEY", logo: "https://i.postimg.cc/nLX7qJQr/sydney.png" },
    { name: "CAMBODIA", logo: "https://i.postimg.cc/xd8GgmhP/cambodia.png" },
    { name: "MAGNUM", logo: "https://i.postimg.cc/ncVXvJ6g/magnum.png" },
    { name: "BULLSEYE", logo: "https://i.postimg.cc/jSgPW52G/bullseye.png" },
    { name: "TOTO MACAU", logo: "https://i.postimg.cc/nhcqc7Fs/totomacu.png" },
    { name: "KING KONG", logo: "https://i.postimg.cc/qRy4rDF2/kkkk.png" }
  ];

  const shioList = [
    { name: "TIKUS", img: "https://i.postimg.cc/T2nQ47nQ/tikusvvvv.png" },
    { name: "KERBAU", img: "https://i.postimg.cc/TYGQMV9G/kerbau222.png" },
    { name: "HARIMAU", img: "https://i.postimg.cc/Wbn82dWr/harimau7.png" },
    { name: "KELINCI", img: "https://i.postimg.cc/4x219rTn/kelinciiiii.png" },
    { name: "NAGA", img: "https://i.postimg.cc/PqBz6Yxc/dvdvdvdvdv.png" },
    { name: "ULAR", img: "https://i.postimg.cc/Kjb7bbt7/ulartt.png" },
    { name: "KUDA", img: "https://i.postimg.cc/mkSY2nwW/kudududud.png" },
    { name: "KAMBING", img: "https://i.postimg.cc/D05xY0Rq/kambigngg.png" },
    { name: "MONYET", img: "https://i.postimg.cc/y6TpNpW3/monyettt.png" },
    { name: "AYAM", img: "https://i.postimg.cc/HssZ807r/ayamamamama.png" },
    { name: "ANJING", img: "https://i.postimg.cc/m22X13F9/anjinggg.png" },
    { name: "BABI", img: "https://i.postimg.cc/RVVsJ1nL/babaibabai.png" }
  ];

  const syairList = [
    "Air terjun mengalir deras<br>Bambu runcing menusuk angin<br>Langit biru menunjuk utara<br>Singa tidur beranjak siang",
    "Harimau berteriak di pagi hari<br>Elang terbang mengejar mangsa<br>Gajah besar berjalan lambat<br>Matahari terbit di ufuk timur",
    "Burung merpati terbang tinggi<br>Ikan berenang di dasar kolam<br>Angin berhembus sangat kencang<br>Petir menyambar di malam gelap",
    "Kancil kecil berlari kencang<br>Buaya tidur di tepi sungai<br>Pohon beringin berdiri tegak<br>Relaksasi jiwa di pagi hari",
    "Mawar merah mekar indah<br>Melati putih wangi semerbak<br>Anggrek hitam misterius<br>Bunga matahari menghadap sinar"
  ];

  const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 
                  'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];

  function randomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
  function randomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function spinContent() {
    const card = document.getElementById('mainCard');
    card.classList.remove('fade-anim');
    void card.offsetWidth;
    card.classList.add('fade-anim');

    // Date
    const d = new Date();
    document.getElementById('dateDisplay').innerText = `Tanggal : ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;

    // Pasaran (Dengan Logo)
    const pasaran = randomItem(pasaranList);
    document.getElementById('pasaranLogo').src = pasaran.logo;

    // Shio
    const shio = randomItem(shioList);
    document.getElementById('animalImg').src = shio.img;
    document.getElementById('animalName').innerText = shio.name;

    // Syair
    document.getElementById('syairContent').innerHTML = randomItem(syairList);

    // Numbers
    document.getElementById('mkValue').innerText = `${randomInt(0,9)} / ${randomInt(0,9)}`;
    document.getElementById('nagaValue').innerText = `${randomInt(0,9)} - ${randomInt(0,9)} - ${randomInt(0,9)}`;

    // Star Numbers
    document.getElementById('starTop').innerText = randomInt(0,9);
    document.getElementById('starRight').innerText = randomInt(0,9);
    document.getElementById('starBottom').innerText = randomInt(0,9);
    document.getElementById('starLeft').innerText = randomInt(0,9);
  }

  async function saveCard() {
    const btn = document.getElementById('btnSave');
    const originalText = btn.innerHTML;
    btn.innerHTML = "PROSES...";
    btn.disabled = true;

    try {
      const card = document.getElementById('mainCard');
      await document.fonts.ready;
      
      const images = card.querySelectorAll('img');
      await Promise.all(Array.from(images).map(img => {
        if (img.complete) return Promise.resolve();
        return new Promise(resolve => {
          img.onload = resolve;
          img.onerror = resolve;
        });
      }));

      const canvas = await html2canvas(card, {
        scale: 3,
        useCORS: true,
        backgroundColor: '#0a0806',
        logging: false
      });

      const link = document.createElement('a');
      link.download = `SYAIR-TOGEL-${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch (err) {
      console.error(err);
      alert('Gagal menyimpan gambar.');
    } finally {
      btn.innerHTML = originalText;
      btn.disabled = false;
    }
  }

  document.getElementById('btnSpin').addEventListener('click', spinContent);
  document.getElementById('btnSave').addEventListener('click', saveCard);

  spinContent();
</script>

</body>
</html>
